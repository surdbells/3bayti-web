name: CI

# Runs on every push to master and every PR. Catches build breakage
# BEFORE Cloudflare Pages tries to deploy. Cloudflare runs its own build
# on deploy, but having CI run independently:
#   - Surfaces failures faster (10s vs 60s+ in CF queue)
#   - Blocks PR merge if the build is broken
#   - Doesn't depend on CF being up
#
# This is build-only — no test step yet because there are no tests.
# Once we have tests, add an `npm test` step and require it to pass
# on PRs.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs when a newer commit is pushed to the same PR.
# Saves CI minutes; only the latest commit's build matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is stricter than `npm install` — fails if package-lock
        # is out of sync, never modifies the lockfile. The right call for CI.
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify SSR output
        # Sanity check: confirms the prerendered pages actually have
        # content (not an empty <app-root>). If SSR breaks silently in
        # the build, this catches it — without this step, Cloudflare
        # would happily deploy an empty shell.
        run: |
          INDEX=dist/3bayti-web/browser/index.html
          if [ ! -f "$INDEX" ]; then
            echo "ERROR: $INDEX not found"
            exit 1
          fi
          if ! grep -q "Premium abayas" "$INDEX"; then
            echo "ERROR: home page hero text missing — SSR may have failed"
            exit 1
          fi
          echo "✓ Home page prerendered ($(wc -c < $INDEX) bytes)"

          CAT=dist/3bayti-web/browser/category/index.html
          if [ ! -f "$CAT" ]; then
            echo "ERROR: $CAT not found — /category route prerender failed"
            exit 1
          fi
          if ! grep -q "Shop by Category" "$CAT"; then
            echo "ERROR: categories page heading missing"
            exit 1
          fi
          echo "✓ Categories page prerendered ($(wc -c < $CAT) bytes)"

          # Verify category-detail prerender for the abayas slug.
          # If the API was up at build time, all 8 category-detail routes
          # are prerendered (one per slug from /v2/categories). We only
          # spot-check abayas because (a) it has the most products, so a
          # zero-product issue would also hit it, and (b) it's a stable
          # slug that's never going away.
          DET=dist/3bayti-web/browser/category/abayas-1/index.html
          if [ ! -f "$DET" ]; then
            echo "ERROR: $DET not found — /category/:slug prerender failed"
            echo "       Check that /v2/categories was reachable during build."
            exit 1
          fi
          if ! grep -q "abayas" "$DET" -i; then
            echo "ERROR: category-detail page missing expected content"
            exit 1
          fi
          if ! grep -q '"@type":"ItemList"' "$DET"; then
            echo "ERROR: ItemList JSON-LD missing from category-detail prerender"
            exit 1
          fi
          NPRODUCTS=$(grep -oE 'class="product-card-name"' "$DET" | wc -l)
          if [ "$NPRODUCTS" -lt 1 ]; then
            echo "ERROR: no product cards rendered on /category/abayas-1"
            exit 1
          fi
          echo "✓ Category-detail prerendered ($(wc -c < $DET) bytes, $NPRODUCTS products)"

          # Verify PDP prerender for la26-2637 (a stable, known product slug
          # from Laduna Abaya). The build prerenders the 200 most-recent
          # products; LA26 is recent enough to be in that window. If LA26
          # ever falls out of the recent-200 window (i.e. hundreds of newer
          # products are added), pick another stable slug to spot-check.
          PDP=dist/3bayti-web/browser/product/la26-2637/index.html
          if [ ! -f "$PDP" ]; then
            echo "ERROR: $PDP not found — /product/:slug prerender failed"
            echo "       Check that /v2/products was reachable during build."
            exit 1
          fi
          if ! grep -qi "Laduna" "$PDP"; then
            echo "ERROR: PDP missing vendor name 'Laduna'"
            exit 1
          fi
          PDP_IMAGES=$(grep -oE 'src="https://api\.3bayti\.ae/cdn-cgi/image[^"]+' "$PDP" | wc -l)
          if [ "$PDP_IMAGES" -lt 1 ]; then
            echo "ERROR: no product images rendered on /product/la26-2637"
            exit 1
          fi
          echo "✓ PDP prerendered ($(wc -c < $PDP) bytes, $PDP_IMAGES image elements)"

      - name: Verify sitemap + robots generated
        run: |
          if [ ! -f dist/3bayti-web/browser/sitemap.xml ]; then
            echo "ERROR: sitemap.xml missing — postbuild hook may have failed"
            exit 1
          fi
          echo "✓ sitemap.xml present"
          if [ ! -f dist/3bayti-web/browser/robots.txt ]; then
            echo "ERROR: robots.txt missing — generated by postbuild"
            exit 1
          fi
          echo "✓ robots.txt present"

name: CI

# Build and deploy the 3bayti web Worker.
#
# This pipeline runs in two stages:
#
#   1. `build` — Always runs (every push, every PR). Builds the production
#      bundle, runs all the SSR-output verification spot-checks, and
#      uploads the built dist/ as an artifact for the deploy job to
#      consume. Independent of Cloudflare uptime.
#
#   2. `deploy` — Runs only on push to master. Downloads the build
#      artifact from stage 1, deploys to Cloudflare Workers via
#      cloudflare/wrangler-action@v3, then smoke-tests the deployed
#      Worker by hitting both a prerendered route (served by the
#      ASSETS binding) and a long-tail product slug (served via
#      runtime SSR). The smoke test is the only check that can prove
#      the assets+SSR routing works end-to-end on the live edge —
#      everything else can lie.
#
# Why two jobs and not one:
#   - PRs build but don't deploy. A single job with conditional steps
#     would either need a `if: github.event_name == 'push'` on every
#     deploy step (fragile and noisy), or pay to install wrangler on
#     PRs that never use it.
#   - Splitting also means the `deploy` job's logs are separate, which
#     makes "did the deploy succeed" a one-glance question for anyone
#     looking at the Actions tab.
#
# Required GitHub secrets (configure under Settings → Secrets and
# variables → Actions):
#   CLOUDFLARE_API_TOKEN   — fine-scoped token with "Edit Cloudflare
#                            Workers" template permissions on this
#                            account.
#   CLOUDFLARE_ACCOUNT_ID  — found in the Cloudflare dash sidebar.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs when a newer commit is pushed to the same PR.
# Saves CI minutes; only the latest commit's build matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is stricter than `npm install` — fails if package-lock
        # is out of sync, never modifies the lockfile. The right call for CI.
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify SSR output
        # Sanity check: confirms the prerendered pages actually have
        # content (not an empty <app-root>). If SSR breaks silently in
        # the build, this catches it — without this step, Cloudflare
        # would happily deploy an empty shell.
        run: |
          INDEX=dist/3bayti-web/browser/index.html
          if [ ! -f "$INDEX" ]; then
            echo "ERROR: $INDEX not found"
            exit 1
          fi
          if ! grep -q "Premium abayas" "$INDEX"; then
            echo "ERROR: home page hero text missing — SSR may have failed"
            exit 1
          fi
          echo "✓ Home page prerendered ($(wc -c < $INDEX) bytes)"

          CAT=dist/3bayti-web/browser/category/index.html
          if [ ! -f "$CAT" ]; then
            echo "ERROR: $CAT not found — /category route prerender failed"
            exit 1
          fi
          if ! grep -q "Shop by Category" "$CAT"; then
            echo "ERROR: categories page heading missing"
            exit 1
          fi
          echo "✓ Categories page prerendered ($(wc -c < $CAT) bytes)"

          # Verify category-detail prerender for the abayas slug.
          # If the API was up at build time, all 8 category-detail routes
          # are prerendered (one per slug from /v2/categories). We only
          # spot-check abayas because (a) it has the most products, so a
          # zero-product issue would also hit it, and (b) it's a stable
          # slug that's never going away.
          DET=dist/3bayti-web/browser/category/abayas-1/index.html
          if [ ! -f "$DET" ]; then
            echo "ERROR: $DET not found — /category/:slug prerender failed"
            echo "       Check that /v2/categories was reachable during build."
            exit 1
          fi
          if ! grep -q "abayas" "$DET" -i; then
            echo "ERROR: category-detail page missing expected content"
            exit 1
          fi
          if ! grep -q '"@type":"ItemList"' "$DET"; then
            echo "ERROR: ItemList JSON-LD missing from category-detail prerender"
            exit 1
          fi
          NPRODUCTS=$(grep -oE 'class="product-card__name"' "$DET" | wc -l)
          if [ "$NPRODUCTS" -lt 1 ]; then
            echo "ERROR: no product cards rendered on /category/abayas-1"
            exit 1
          fi
          echo "✓ Category-detail prerendered ($(wc -c < $DET) bytes, $NPRODUCTS products)"

          # Verify PDP prerender for la26-2637 (a stable, known product slug
          # from Laduna Abaya). The build prerenders the 200 most-recent
          # products; LA26 is recent enough to be in that window. If LA26
          # ever falls out of the recent-200 window (i.e. hundreds of newer
          # products are added), pick another stable slug to spot-check.
          PDP=dist/3bayti-web/browser/product/la26-2637/index.html
          if [ ! -f "$PDP" ]; then
            echo "ERROR: $PDP not found — /product/:slug prerender failed"
            echo "       Check that /v2/products was reachable during build."
            exit 1
          fi
          if ! grep -qi "Laduna" "$PDP"; then
            echo "ERROR: PDP missing vendor name 'Laduna'"
            exit 1
          fi
          PDP_IMAGES=$(grep -oE 'src="https://api\.3bayti\.ae/cdn-cgi/image[^"]+' "$PDP" | wc -l)
          if [ "$PDP_IMAGES" -lt 1 ]; then
            echo "ERROR: no product images rendered on /product/la26-2637"
            exit 1
          fi
          echo "✓ PDP prerendered ($(wc -c < $PDP) bytes, $PDP_IMAGES image elements)"

      - name: Verify sitemap + robots generated
        run: |
          if [ ! -f dist/3bayti-web/browser/sitemap.xml ]; then
            echo "ERROR: sitemap.xml missing — postbuild hook may have failed"
            exit 1
          fi
          echo "✓ sitemap.xml present"
          if [ ! -f dist/3bayti-web/browser/robots.txt ]; then
            echo "ERROR: robots.txt missing — generated by postbuild"
            exit 1
          fi
          echo "✓ robots.txt present"

      - name: Verify Worker bundle is present and exports a fetch handler
        # The Cloudflare Worker entry must end up at
        # dist/3bayti-web/server/server.mjs with a default export
        # exposing a fetch() function. If the angular.json ssr.entry
        # ever drifts back to the Node-only src/server.ts, the deploy
        # would silently produce a Worker that won't run on the
        # Workers runtime. This catches that.
        run: |
          WORKER=dist/3bayti-web/server/server.mjs
          if [ ! -f "$WORKER" ]; then
            echo "ERROR: $WORKER not found — angular build may not have produced the SSR entry"
            exit 1
          fi
          if ! grep -q 'fetch' "$WORKER"; then
            echo "ERROR: Worker bundle has no 'fetch' reference — wrong entry point?"
            exit 1
          fi
          echo "✓ Worker bundle present ($(wc -c < $WORKER) bytes)"

      - name: Tar build output
        # Tar the build before uploading. This eliminates any ambiguity
        # about how upload-artifact computes the artifact's root path
        # (it uses the "least common ancestor" of the input files,
        # which can drop the `dist/` prefix when uploading a directory
        # directly). The deploy job extracts the tar at workspace root,
        # so wrangler.jsonc's `dist/3bayti-web/server/server.mjs` path
        # resolves correctly.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: tar -czf build-output.tar.gz dist/

      - name: Upload build artifact
        # `if-no-files-found: error` means the workflow fails fast if
        # the build silently produced nothing.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.tar.gz
          retention-days: 1
          if-no-files-found: error

  deploy:
    # Only deploy on push-to-master. PRs build (above) but never deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `deployments: write` lets the action create GitHub Deployment
    # entries (the colored boxes on commits / PRs). Optional but nice.
    permissions:
      contents: read
      deployments: write
    # Capture the deployment URL as an output for the smoke-test step.
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Extract build output
        # download-artifact drops build-output.tar.gz at the workspace
        # root. Extract in place so dist/ lands where wrangler.jsonc
        # expects it. Verify the Worker bundle survived the round trip.
        run: |
          tar -xzf build-output.tar.gz
          rm build-output.tar.gz
          if [ ! -f dist/3bayti-web/server/server.mjs ]; then
            echo "ERROR: Worker bundle missing after artifact extract"
            ls -la dist/ dist/3bayti-web/ 2>&1 || true
            exit 1
          fi
          echo "✓ Build artifact extracted, Worker bundle present"

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin to the same wrangler major we install in package.json
          # so local and CI behavior match.
          wranglerVersion: '4'
          # `wrangler deploy` reads wrangler.jsonc from the working
          # directory; main + assets.directory are configured there.
          command: deploy
          # Surface the deployment in GitHub's UI.
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Deployed to: $DEPLOYMENT_URL"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "WARNING: deployment-url output was empty. Smoke test will fail without a target URL."
          fi

      - name: Smoke-test the deployment
        # The point of this step: prove that BOTH static-asset routing
        # AND runtime SSR work on the live edge. Without this, a
        # successful `wrangler deploy` only proves the upload worked —
        # it tells us nothing about whether the Worker actually serves
        # requests correctly.
        #
        # We test three URLs against TWO targets:
        #
        #   Targets:
        #     A. The fresh workers.dev URL from `wrangler deploy`.
        #        Catches Worker-side problems (bundle, runtime, SSR
        #        engine, allowedHosts) before any custom-domain / DNS
        #        layer is in the picture.
        #     B. The production custom domain (staging.3bayti.ae).
        #        Catches custom-domain-routing problems: Pages-vs-
        #        Workers misrouting, SSL issues, the Cloudflare zone
        #        sending traffic somewhere unexpected. This is what
        #        real users hit, so this is the test that matters
        #        most for "is the migration still working in
        #        production."
        #
        #   Tests (run against each target):
        #     1. /              → must be served by ASSETS (prerendered home).
        #                         Expectation: 200, contains "Premium abayas".
        #     2. /product/la26-2637 → top-200 prerendered PDP, ASSETS.
        #                         Expectation: 200, contains "Laduna".
        #     3. /product/{long-tail-slug} → NOT prerendered, runtime SSR.
        #                         Expectation: 200, <title> contains a real
        #                         vendor name (not the fallback "Product · 3bayti").
        #
        # If #3 returns the fallback title, that's the SSR-broken bug
        # we built this whole migration to fix — fail the workflow loudly.
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          # Production custom domain. Hardcoded because (a) it doesn't
          # change per-deploy and (b) putting it in a secret would
          # imply it's sensitive, which it isn't (the URL appears in
          # the public sitemap.xml and rel=canonical tags).
          PROD_URL: 'https://staging.3bayti.ae'
        run: |
          set -e

          # smoke_test BASE_URL LABEL
          # Runs all three smoke tests against the given URL.
          # Returns 0 on pass, exits the script on failure.
          smoke_test() {
            local BASE="${1%/}"
            local LABEL="$2"

            echo ""
            echo "================================================================"
            echo " Smoke-testing target: $LABEL"
            echo " URL: $BASE"
            echo "================================================================"

            echo ""
            echo "[$LABEL] Test 1: Prerendered home (served by ASSETS)"
            local HOME_BODY HOME_STATUS
            HOME_BODY=$(curl -fsS --max-time 30 "$BASE/")
            HOME_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$BASE/")
            if [ "$HOME_STATUS" != "200" ]; then
              echo "ERROR [$LABEL]: / returned $HOME_STATUS"
              exit 1
            fi
            if ! echo "$HOME_BODY" | grep -q "Premium abayas"; then
              echo "ERROR [$LABEL]: home page does not contain 'Premium abayas'"
              exit 1
            fi
            echo "✓ [$LABEL] home: 200 OK, content present"

            echo ""
            echo "[$LABEL] Test 2: Prerendered top-200 PDP (served by ASSETS)"
            local PDP_BODY PDP_STATUS
            PDP_BODY=$(curl -fsS --max-time 30 "$BASE/product/la26-2637")
            PDP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$BASE/product/la26-2637")
            if [ "$PDP_STATUS" != "200" ]; then
              echo "ERROR [$LABEL]: /product/la26-2637 returned $PDP_STATUS"
              exit 1
            fi
            if ! echo "$PDP_BODY" | grep -qi "Laduna"; then
              echo "ERROR [$LABEL]: prerendered PDP does not contain vendor 'Laduna'"
              exit 1
            fi
            echo "✓ [$LABEL] prerendered PDP: 200 OK, vendor name present"

            echo ""
            echo "[$LABEL] Test 3: Long-tail PDP (RUNTIME SSR via Worker)"
            # Pick a slug from the sitemap that is NOT in the prerendered
            # top-200. We compute this once before the loop and reuse;
            # but to keep the function self-contained, do it here.
            ls dist/3bayti-web/browser/product/ | sort > /tmp/prerendered.txt
            grep -oE '<loc>[^<]+/product/[^<]+</loc>' \
                dist/3bayti-web/browser/sitemap.xml \
              | sed -E 's|.*/product/([^<]+)</loc>|\1|' \
              | sort > /tmp/all-slugs.txt
            local LONG_TAIL
            LONG_TAIL=$(comm -23 /tmp/all-slugs.txt /tmp/prerendered.txt | head -1)

            if [ -z "$LONG_TAIL" ]; then
              echo "WARNING [$LABEL]: no long-tail slug found (catalogue ≤ 200 products?). Skipping runtime-SSR smoke test."
              return 0
            fi

            echo "Selected long-tail slug: $LONG_TAIL"
            # Generous timeout — cold Worker invocations can take a few
            # seconds, especially with an upstream API call.
            local TAIL_BODY TAIL_STATUS TAIL_TITLE
            TAIL_BODY=$(curl -fsS --max-time 60 "$BASE/product/$LONG_TAIL")
            TAIL_STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$BASE/product/$LONG_TAIL")
            if [ "$TAIL_STATUS" != "200" ]; then
              echo "ERROR [$LABEL]: /product/$LONG_TAIL returned $TAIL_STATUS — runtime SSR is broken"
              exit 1
            fi

            # The fallback title is the static one set in app.routes.ts
            # ("Product · 3bayti"). If we see it, the long-tail PDP did
            # NOT actually go through SSR — the Worker is serving an
            # empty shell, which is the exact bug this migration fixes.
            TAIL_TITLE=$(echo "$TAIL_BODY" | grep -oE '<title>[^<]+</title>' | head -1)
            echo "Title: $TAIL_TITLE"
            if echo "$TAIL_TITLE" | grep -qE '<title>Product · 3bayti</title>'; then
              echo "ERROR [$LABEL]: long-tail PDP returned the fallback title — runtime SSR is broken!"
              echo "       The Worker is serving the empty shell instead of fetching product data."
              exit 1
            fi

            # Sanity check: title should mention "by " (e.g. "001 by Orchid Line | 3bayti")
            if ! echo "$TAIL_TITLE" | grep -q ' by '; then
              echo "ERROR [$LABEL]: long-tail PDP title doesn't look like a real product title:"
              echo "       $TAIL_TITLE"
              exit 1
            fi

            echo "✓ [$LABEL] long-tail PDP: 200 OK, runtime SSR served real product data"
          }

          # ---- Target A: workers.dev URL (fresh from this deploy) ----
          # This is the immediate-feedback test. If this fails, the
          # Worker itself is broken — no point checking the production
          # domain since it routes to the same Worker.
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "ERROR: no deployment URL available; cannot smoke-test"
            exit 1
          fi
          smoke_test "$DEPLOYMENT_URL" "workers.dev"

          # ---- Target B: production custom domain ----
          # If this fails but workers.dev passed, the issue is in the
          # custom-domain routing layer (DNS, SSL, zone config), not
          # the Worker code. That's a Cloudflare-dashboard problem,
          # not a code-deploy problem — but still a production
          # outage, so fail the workflow loudly.
          smoke_test "$PROD_URL" "production"

          echo ""
          echo "🎉 All smoke tests passed against both targets."
